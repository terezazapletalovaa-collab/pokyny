<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Pokyny k zájezdu</title>

<style>
    body {
        font-family: Arial, Helvetica, sans-serif;
        background: #ffffff;
        color: #ffffff;
        margin: 30px;
        line-height: 1.5;
    }

    .container {
        max-width: 900px;
        margin: 0 auto;
    }

    .section {
        position: relative;
        background: #0f2b5b;
        border-radius: 18px;
        padding: 30px 30px 25px 90px;
        margin-bottom: 20px;
        page-break-inside: avoid;
    }

    .icon {
        position: absolute;
        top: 20px;
        left: 20px;
        width: 48px;
        height: 48px;
        object-fit: contain;
    }

    .section-title {
        font-size: 22px;
        font-weight: bold;
        margin-bottom: 15px;
        color: #ffffff;
    }

    .section-content {
        font-size: 14px;
        color: #ffffff;
    }

    ul {
        margin: 0;
        padding-left: 20px;
    }

    li {
        margin-bottom: 6px;
    }
</style>
</head>

<body>

<div class="container">

    <!-- Sekce 1 -->
    <div class="section">
        <img src="ikona-doprava.png" alt="" class="icon">
        <div class="section-title">Doprava</div>
        <div class="section-content">
            <p>
                Sem doplňte informace o odjezdu, místu srazu,
                časech a dalších organizačních pokynech.
            </p>
        </div>
    </div>

    <!-- Sekce 2 -->
    <div class="section">
        <img src="ikona-hotel.png" alt="" class="icon">
        <div class="section-title">Ubytování</div>
        <div class="section-content">
            <p>
                Sem vložte informace o hotelu, check-inu,
                adrese a kontaktech.
            </p>
        </div>
    </div>

    <!-- Sekce 3 -->
    <div class="section">
        <img src="ikona-info.png" alt="" class="icon">
        <div class="section-title">Důležité informace</div>
        <div class="section-content">
            <ul>
                <li>První bod pokynů</li>
                <li>Druhý bod pokynů</li>
                <li>Třetí bod pokynů</li>
            </ul>
        </div>
    </div>

</div>

</body>
</html>
